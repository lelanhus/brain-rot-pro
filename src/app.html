<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<meta
			name="description"
			content="A zero-friction feed of source-backed knowledge cards. One more idea, always."
		/>
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/icon.svg" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0b0f" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f7fb" />
		<meta name="color-scheme" content="dark light" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Brain Rot" />
		<!-- Apply a forced theme before first paint (no flash). 'system' is the
		     absence of the attribute and falls through to prefers-color-scheme. -->
		<script>
			try {
				var t = localStorage.getItem('brp_theme');
				if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
